[pytest]
# Directorio de tests
testpaths = tests

# Markers estándar del proyecto
markers =
    unit: Tests unitarios (sin DB, sin red)
    integration: Tests de integración (requieren food_store_test_db activa en :5433)
    slow: Tests lentos (FSM completo, carga de datos, etc.)

# Falla si se usa un marker no declarado arriba
addopts = --strict-markers -v

# Nivel de log visible durante la corrida (útil para debug)
log_cli = false
log_level = WARNING
